<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>For My Love 💖</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  overflow: hidden;
  font-family: Arial;
  color: #0ce15e;
}

/* ===== HEART CENTER ===== */
.heart-center {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 380px;
  height: 380px;
  z-index: 5;
  pointer-events: none;
}

.center-text {
  position: absolute;
  top: 52%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 26px;
  text-align: center;
}

/* ===== ENVELOPE ===== */
.envelope {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  width: 200px;
  height: 120px;
  background: #0ce15e;
  cursor: pointer;
  z-index: 10;
}

.envelope:before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  border-left: 100px solid transparent;
  border-right: 100px solid transparent;
  border-bottom: 60px solid #08a94a;
}

.envelope.open {
  animation: openEnv 1s forwards;
}

@keyframes openEnv {
  to { transform: translateX(-50%) scale(1.2) rotateX(180deg); opacity:0; }
}

/* ===== LETTER ===== */
.letter {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  display: none;
  z-index: 20;
  overflow-y: auto;
  padding: 30px;
}

.typing {
  max-width: 800px;
  margin: auto;
  font-size: 18px;
  line-height: 1.8;
  white-space: pre-line;
}

/* ===== BUTTON ===== */
#viewBtn {
  display: none;
  margin: 30px auto;
  padding: 12px 25px;
  font-size: 18px;
  background: #0ce15e;
  border: none;
  border-radius: 10px;
  color: black;
  cursor: pointer;
  transition: 0.3s;
}

#viewBtn:hover {
  transform: scale(1.1);
  background: #08a94a;
}

/* ===== STAR BACKGROUND ===== */
.star {
  position: fixed;
  width: 2px;
  height: 2px;
  background: white;
  opacity: 0.5;
  animation: blink 2s infinite;
}

@keyframes blink {
  50% { opacity: 1; }
}
</style>
</head>

<body>

<!-- STARS -->
<script>
for(let i=0;i<60;i++){
  let s=document.createElement("div");
  s.className="star";
  s.style.top=Math.random()*100+"%";
  s.style.left=Math.random()*100+"%";
  document.body.appendChild(s);
}
</script>

<!-- HEART -->
<div class="heart-center">
  <canvas id="pinkboard"></canvas>
  <div class="center-text">
    Gửi em yêu<br><br>
    Đoàn Quang Mỹ Linh
  </div>
</div>

<!-- ENVELOPE -->
<div class="envelope" onclick="openLetter(this)"></div>

<!-- LETTER -->
<div class="letter" id="letter">
  <div class="typing" id="typing"></div>

  <div style="text-align:center;">
    <button id="viewBtn">Xem ảnh 💖</button>
  </div>
</div>

<!-- AUDIO Cần đổi lại link nhạc, tải file về rồi đẩy lên google drive--> 
<audio id="music" loop>
  <source src="https://www2.cs.uic.edu/~i101/SoundFiles/HappyBirthday.mid">
</audio>

<script>
const text = `... (giữ nguyên nội dung của bạn) ...`;

function typeWriter(el, text, speed=10){
  let i=0;
  function typing(){
    if(i<text.length){
      el.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing,speed);
    } else {
      // HIỆN BUTTON SAU KHI CHẠY XONG
      document.getElementById("viewBtn").style.display = "block";
    }
  }
  typing();
}

function openLetter(el){
  el.classList.add("open");
  setTimeout(()=>{
    document.getElementById("letter").style.display="block";
    typeWriter(document.getElementById("typing"), text);
    document.getElementById("music").play();
  },800);
}

// CLICK BUTTON → MỞ LINK ẢNH Cần đổi lại link ảnh, đẩy lên google drive
document.getElementById("viewBtn").onclick = function(){
  window.open("https://link-anh-cua-ban.com", "_blank");
};
</script>

<!-- HEART SCRIPT -->
<script>
/* giữ nguyên script tim của bạn ở đây */
</script>

</body>
</html>
